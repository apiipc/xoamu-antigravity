<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự Kiện - Xóa Mù Antigravity</title>
    <!-- Kế thừa thư viện CSS có nền cam và hiệu ứng kính mờ của Slide -->
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Specific adjustments for the landing layout that build upon style.css */
        body, #app {
            overflow-y: auto !important; /* Enable scrolling for landing page */
            height: auto;
            min-height: 100vh;
        }
        
        .landing-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 8rem 2rem 5rem;
            position: relative;
            z-index: 10;
        }

        .landing-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .title-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .main-title {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
            letter-spacing: -1px;
        }

        .sub-title {
            font-size: 1.25rem;
            color: rgba(255,255,255,0.85);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .event-list-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Glassmorphism Event Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), inset 0 2px 4px rgba(255,255,255,0.4);
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), inset 0 2px 4px rgba(255,255,255,0.5);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .card-left {
            display: flex;
            align-items: flex-start;
            gap: 1.8rem;
        }

        .circle-num {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.25);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Differentiate inactive status */
        .glass-card.past {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .glass-card.past:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            cursor: default;
        }
        .glass-card.past .circle-num, .glass-card.past .card-title, .glass-card.past .card-meta {
            opacity: 0.6;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-top: 0.2rem;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: -0.3px;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.85;
            letter-spacing: 0.5px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon {
            width: 16px;
            height: 16px;
            stroke-width: 2.5;
            color: inherit;
        }

        .card-action {
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-past {
            color: rgba(255,255,255,0.5);
        }

        .action-active {
            color: #ffffff;
            background: rgba(255,255,255,0.25);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .glass-card:hover .action-active {
            background: #ffffff;
            color: #d4511d; /* Orange text on white button */
            transform: translateX(5px);
        }
        
        .top-nav {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            background: rgba(255,255,255,0.15);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            transition: opacity 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .back-btn:hover { opacity: 1; }

        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; }
            .glass-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 2rem;
                padding: 1.5rem;
            }
            .card-action {
                align-self: stretch;
                justify-content: flex-end;
            }
        }
        #app {
            background: transparent !important;
            pointer-events: none;
        }
        .top-nav a, .main-title, .glass-card {
            pointer-events: auto;
        }
    </style>
</head>
<body class="light-theme">
    <div id="vanta-bg" style="position: fixed; z-index: 0; top: 0; left: 0; width: 100vw; height: 100vh;"></div>
    
    <div id="app" style="position: relative; z-index: 1;">


        <div class="landing-container">
            
            <div class="landing-header">
                <h1 class="main-title">Basic Tech AI</h1>
            </div>

            <div class="event-list-container">
                
                <a href="index.html" class="glass-card" style="justify-content: center; text-decoration: none;">
                    <h3 class="card-title" style="margin: 0; font-size: 1.8rem; color: #fff;">Lớp Xóa mù Antigravity</h3>
                </a>

                <a href="skill_ai_agent.html" class="glass-card" style="justify-content: center; text-decoration: none; margin-top: 1.5rem;">
                    <h3 class="card-title" style="margin: 0; font-size: 1.8rem; color: #fff;">Xóa Mù Skill AI Agent</h3>
                </a>

            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            VANTA.NET({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0xffffff,
                backgroundColor: 0xd4511d,
                backgroundAlpha: 0.0,
                points: 15.00,
                maxDistance: 22.00,
                spacing: 16.00,
                showDots: true
            });
        });
    </script>
</body>
</html>
